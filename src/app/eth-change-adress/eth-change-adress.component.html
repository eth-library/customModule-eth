<mat-card appearance="outlined" class="mat-mdc-card mdc-card mat-mdc-card-outlined mdc-card--outlined eth-change-adress">
    <mat-card-header class="mat-mdc-card-header">
        <div class="mat-mdc-card-header-text">
            <mat-card-title class="mat-mdc-card-title mat-title-medium"><h3>Adresse bearbeiten</h3></mat-card-title>
        </div>
    </mat-card-header>
    <mat-card-content class="mat-mdc-card-content">
      <div>
        <h4>ETH-Angehörige</h4> 
        <span>Ändern Sie Ihre Adresse in 2 Schritten:</span>
        <ol>
          <li>
            1. Adresse ändern:
            <div>
              <a target="_blank" rel="noopener" href="https://www.bi.id.ethz.ch/eAdressen" [attr.aria-label]="'https://www.bi.id.ethz.ch/eAdressen' + ('nui.aria.newWindow' | translate)">
                https://www.bi.id.ethz.ch/eAdressen
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 -960 960 960" aria-hidden="true" focusable="false">
                  <path d="m256-240-56-56 384-384H240v-80h480v480h-80v-344L256-240Z"></path>
                </svg>                
              </a>
            </div>
          </li>
          <li>
            2. Adressänderung bestätigen:
            <div>
              <a target="_blank" rel="noopener" href="https://eduid.ch" [attr.aria-label]="'https://eduid.ch' + ('nui.aria.newWindow' | translate)">
                https://eduid.ch
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 -960 960 960" aria-hidden="true" focusable="false">
                  <path d="m256-240-56-56 384-384H240v-80h480v480h-80v-344L256-240Z"></path>
                </svg>                     
              </a>
            </div>
          </li>
        </ol>
      </div>
      <mat-divider role="separator" tabindex="-1" aria-hidden="true" class="mat-divider mat-divider-horizontal ng-star-inserted" aria-orientation="horizontal"></mat-divider>
      <div>
        <h4>Privatpersonen</h4>
        <span>Ändern Sie Ihre Adresse hier:</span>
        <div>
          <a target="_blank" rel="noopener" href="https://eduid.ch" [attr.aria-label]="'https://eduid.ch' + ('nui.aria.newWindow' | translate)">
            https://eduid.ch
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 -960 960 960" aria-hidden="true" focusable="false">
              <path d="m256-240-56-56 384-384H240v-80h480v480h-80v-344L256-240Z"></path>
            </svg>                 
          </a>
        </div>
      </div>
    </mat-card-content>
  </mat-card>
