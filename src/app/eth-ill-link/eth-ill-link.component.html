@if(url$ | async; as url){
    @if(translations$ | async; as t){
        <div class="eth-ill-link">
            <div>{{ t.t1 }}</div>
            <div>
                <span>{{ t.t2 }} </span>
                <a [href]="url" target="_blank" rel="noopener" [attr.aria-label]="t.linkText + t.newWindow">
                    <span>{{ t.linkText }}</span>
                </a>
                <span>{{ t.t3 }}</span>
            </div>
        </div>
    }
}
