@if (links$ | async; as links) { 
    @if (links.length > 0) {
    <div class="eth-compose-nb">
        @for (link of links; track link.url) {
            @if (link.url) {
                <div>
                    <a [href]="'/nde'+link.url" (click)="navigate(link.url,$event)">{{ link.label }}</a>
                </div>
            }
        }
    </div>
    }    
}
